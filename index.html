<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Johannes Fitness Hub</title>
  <meta name="theme-color" content="#10b981" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fitness Hub" />
  <style>
    :root{--bg:#050505;--panel:#09090b;--card:#111113;--card2:#18181b;--line:#27272a;--muted:#a1a1aa;--dim:#71717a;--text:#f4f4f5;--green:#10b981;--green2:#34d399;--red:#f87171;--blue:#60a5fa}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top left,rgba(16,185,129,.18),transparent 34%),radial-gradient(circle at bottom right,rgba(59,130,246,.12),transparent 32%),linear-gradient(135deg,#050505,#111 52%,#050505);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;min-height:100vh} button,input,select,textarea{font:inherit} button{cursor:pointer} .app{max-width:1280px;margin:0 auto;padding:24px 16px;display:grid;grid-template-columns:285px 1fr;gap:24px}.side{position:sticky;top:24px;height:calc(100vh - 48px);overflow:auto;border:1px solid var(--line);background:rgba(9,9,11,.82);border-radius:32px;padding:16px;backdrop-filter:blur(18px);display:flex;flex-direction:column}.logo{font-weight:950;font-size:24px;letter-spacing:-.04em}.tag{font-size:11px;color:var(--green2);font-weight:900;letter-spacing:.28em;text-transform:uppercase;margin-top:4px}.nav{display:grid;gap:8px;margin:30px 0 12px;user-select:none;touch-action:manipulation}.nav button{width:100%;border:0;border-radius:18px;padding:13px 15px;text-align:left;background:transparent;color:#d4d4d8;font-weight:900;position:relative;transition:transform .18s ease,background .18s ease,box-shadow .18s ease,opacity .18s ease}.nav button.active{background:var(--green);color:#06110d}.nav button:hover:not(.active){background:#18181b}.nav button.nav-hold{box-shadow:0 0 0 1px rgba(16,185,129,.32),0 12px 28px rgba(16,185,129,.12)}.nav button.nav-dragging,button.nav-dragging{z-index:20;transform:scale(1.065) translateY(-3px);box-shadow:0 26px 58px rgba(0,0,0,.52),0 0 0 1px rgba(52,211,153,.68),0 0 32px rgba(16,185,129,.2);background:#18181b;color:#fff;opacity:1!important;filter:none!important;text-shadow:none!important;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif!important;font-weight:900!important;font-size:14px!important;letter-spacing:0!important;text-align:left!important;border:0!important;border-radius:18px!important;padding:13px 15px!important;line-height:normal!important}.nav button.nav-dragging.active,button.nav-dragging.active{background:var(--green);color:#06110d}.nav button.nav-target{opacity:1}.nav-placeholder{height:50px;border:1px dashed rgba(52,211,153,.55);border-radius:18px;background:rgba(16,185,129,.08);box-shadow:inset 0 0 0 1px rgba(16,185,129,.12);transition:margin .14s ease,transform .14s ease}.panel,.card{border:1px solid var(--line);background:rgba(17,17,19,.86);border-radius:28px;padding:20px;box-shadow:0 20px 50px rgba(0,0,0,.2)}.panel{margin-top:14px;border-radius:22px;padding:16px}.utilities{margin-top:auto;padding-top:34px;display:grid;gap:10px}.utilities .panel{margin-top:0;border-radius:18px;padding:12px;background:rgba(17,17,19,.62);box-shadow:none;opacity:.78}.utilities .panel:hover,.utilities .panel:focus-within{opacity:1}.utilities b{font-size:14px}.utilities .small{font-size:11px}.utilities .btn{padding:8px 11px;border-radius:12px;font-size:12px}.utilities .input{padding:9px 10px;border-radius:12px;font-size:13px}.utilities label span.lbl{font-size:10px}.utilities .sync-status{font-size:11px}.main{min-width:0}.title{font-size:38px;line-height:1.05;margin:0 0 6px;font-weight:950;letter-spacing:-.05em}.sub{margin:0 0 24px;color:var(--muted);font-size:14px}.grid{display:grid;gap:16px}.g2{grid-template-columns:repeat(2,minmax(0,1fr))}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}.g4{grid-template-columns:repeat(4,minmax(0,1fr))}.g5{grid-template-columns:repeat(5,minmax(0,1fr))}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.between{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.btn{border:0;border-radius:14px;padding:10px 14px;font-size:14px;font-weight:950;transition:.15s;background:var(--green);color:#04120d}.btn:hover{filter:brightness(1.08)}.btn.secondary{background:#27272a;color:#f4f4f5}.btn.danger{background:rgba(248,113,113,.13);color:#fecaca;border:1px solid rgba(248,113,113,.34)}.btn.ghost{background:transparent;color:#d4d4d8;border:1px solid #3f3f46}.btn:disabled{opacity:.45;cursor:not-allowed}.input,label select,textarea{width:100%;border:1px solid #3f3f46;background:#09090b;color:#f4f4f5;border-radius:14px;padding:12px;outline:none}.input:focus,select:focus,textarea:focus{border-color:var(--green)}label span.lbl{display:block;color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:950;margin:0 0 6px}.pill{display:inline-flex;align-items:center;border:1px solid #3f3f46;background:#09090b;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;color:#d4d4d8;margin:3px}.metric{border:1px solid var(--line);background:#09090b;border-radius:22px;padding:16px}.metric .l{font-size:11px;color:var(--dim);font-weight:950;text-transform:uppercase}.metric .v{margin-top:6px;font-size:28px;font-weight:950;color:white}.small{font-size:12px;color:var(--dim);line-height:1.5}.muted{color:var(--muted)}.green{color:var(--green2)}.red{color:var(--red)}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}.empty{border:1px dashed #3f3f46;background:rgba(17,17,19,.55);border-radius:28px;padding:32px;text-align:center;color:var(--muted)}table{width:100%;border-collapse:separate;border-spacing:0 8px}th{text-align:left;color:var(--dim);font-size:11px;text-transform:uppercase;padding:0 10px}td{background:#09090b;padding:12px 10px}td:first-child{border-radius:14px 0 0 14px}td:last-child{border-radius:0 14px 14px 0}.ingredient,.setrow{display:grid;gap:8px;background:#09090b;border-radius:18px;padding:12px;margin-top:8px}.ingredient{grid-template-columns:1fr 120px 90px 90px 90px auto}.setrow{grid-template-columns:80px 1fr 1fr auto}.hr{height:1px;background:var(--line);margin:14px 0}.notice{border:1px solid rgba(16,185,129,.35);background:rgba(16,185,129,.08);border-radius:18px;padding:12px;color:#d1fae5;font-size:13px}.errorbox{position:fixed;inset:16px;z-index:99;background:#180b0b;color:#fee2e2;border:1px solid #ef4444;border-radius:18px;padding:18px;display:none;white-space:pre-wrap;overflow:auto} .sync-status{font-size:12px;font-weight:900;margin-top:4px}.hide{display:none!important}
    @media(max-width:900px){.app{grid-template-columns:1fr;padding:14px}.side{position:relative;top:0;height:auto}.utilities{margin-top:18px;padding-top:0}.title{font-size:32px}.g2,.g3,.g4,.g5{grid-template-columns:1fr}.ingredient{grid-template-columns:1fr 1fr}.setrow{grid-template-columns:1fr 1fr}.nav{grid-template-columns:1fr 1fr}.nav button{font-size:13px}.card,.panel{padding:16px}.tablewrap{overflow:auto}table{min-width:620px}}
  </style>
</head>
<body>
  <div id="error" class="errorbox"></div>
  <div id="root"></div>
<script>
window.addEventListener('error',e=>{const box=document.getElementById('error'); box.style.display='block'; box.textContent='Fehler in der App:\n'+e.message+'\n\nZeile: '+e.lineno+':'+e.colno+'\n\nBitte diese Datei an ChatGPT schicken, falls es wieder passiert.'});
(function(){
const STORAGE_KEY='johannes-fitness-hub-v3';
const SYNC_KEY='johannes-fitness-hub-github-sync-v1';
let page='home', gymTab='exercises', mealFilter='Alle', mealSearch='', activeSession=null, editingExercise=null, editingWorkout=null, editingMeal=null, autoTimer=null;
const MAIN_NAV=[['home','🏠 Home'],['gym','🏋️ Gym-Tracker'],['meals','🍽️ Meal-Bibliothek'],['nutrition','🎯 Ernährungsplan']];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const now=()=>new Date().toISOString();
const n=v=>Number(v||0);
const kcal=(p,c,f)=>Math.round(n(p)*4+n(c)*4+n(f)*9);
const fmt=iso=>iso?new Date(iso).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'-';
const esc=v=>String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const clone=o=>JSON.parse(JSON.stringify(o));
const defaultState=()=>({
  gym:{exercises:[{id:uid(),name:'Flachbankdrücken Langhantel',category:'Brust'},{id:uid(),name:'Schulterdrücken Kurzhantel',category:'Schultern'},{id:uid(),name:'Kniebeugen',category:'Beine'}],workouts:[],sessions:[]},
  meals:{categories:['Frühstück','Pre-Workout','Post-Workout','Abend','Snack'],meals:[
    {id:uid(),name:'Protein Oats',category:'Frühstück',suitableFor:'Frühstück / Pre-Workout',note:'Cleanes High-Carb Meal',ingredients:[{id:uid(),name:'Haferflocken',portion:'80 g',protein:10,carbs:48,fat:6},{id:uid(),name:'Whey',portion:'30 g',protein:24,carbs:2,fat:1},{id:uid(),name:'Banane',portion:'1 Stück',protein:1,carbs:27,fat:0}]},
    {id:uid(),name:'Chicken Rice Bowl',category:'Post-Workout',suitableFor:'Post-Workout',note:'Leicht verdaulich, viel Carbs',ingredients:[{id:uid(),name:'Reis gekocht',portion:'300 g',protein:8,carbs:84,fat:1},{id:uid(),name:'Hähnchenbrust',portion:'160 g',protein:36,carbs:0,fat:3}]}
  ]},
  ui:{navOrder:['home','gym','meals','nutrition']},
  nutrition:{phase:'cut',weightLog:[],phases:{
    cut:{id:'cut',name:'Cut',calories:2300,meals:5,weight:79.5,protein:180,fat:60,goal:'Defizit, Leistung erhalten, Hunger kontrollieren.'},
    maintenance:{id:'maintenance',name:'Maintenance',calories:2750,meals:5,weight:79.5,protein:175,fat:70,goal:'Gewicht stabil halten und Performance steigern.'},
    bulk:{id:'bulk',name:'Aufbau',calories:3150,meals:5,weight:79.5,protein:175,fat:75,goal:'Kontrollierter Aufbau mit sauberer Carbs-Verteilung.'}
  }}
});
let state=load(STORAGE_KEY,defaultState());
ensureStateShape();
let sync=load(SYNC_KEY,{enabled:false,auto:false,owner:'',repo:'',branch:'main',path:'fitness-hub-data.json',token:'',status:'Lokal'});
function ensureStateShape(){const valid=MAIN_NAV.map(x=>x[0]);state.ui=state.ui||{};state.ui.navOrder=Array.isArray(state.ui.navOrder)?state.ui.navOrder.filter(x=>valid.includes(x)):[];valid.forEach(k=>{if(!state.ui.navOrder.includes(k))state.ui.navOrder.push(k)});}
function navItems(){ensureStateShape();return state.ui.navOrder.map(k=>MAIN_NAV.find(x=>x[0]===k)).filter(Boolean)}
function persistStateOnly(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));if(sync?.enabled&&sync?.auto){clearTimeout(autoTimer);autoTimer=setTimeout(()=>githubUpload(false),1800)}}
function load(k,f){try{return JSON.parse(localStorage.getItem(k))||f}catch{return f}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); if(sync.enabled&&sync.auto){clearTimeout(autoTimer); autoTimer=setTimeout(()=>githubUpload(false),1800)} render();}
function saveSync(){localStorage.setItem(SYNC_KEY,JSON.stringify(sync)); render();}
function mealTotals(m){return (m.ingredients||[]).reduce((a,i)=>({p:a.p+n(i.protein),c:a.c+n(i.carbs),f:a.f+n(i.fat),k:a.k+kcal(i.protein,i.carbs,i.fat)}),{p:0,c:0,f:0,k:0})}
function render(){document.getElementById('root').innerHTML=`<div class="app"><aside class="side">${sidebar()}</aside><main class="main">${views[page]()}</main></div>`; bind();}
function sidebar(){return `<div style="padding:0 8px 16px"><div class="logo">FITNESS HUB</div><div class="tag">Johannes</div></div><div class="nav" id="mainNav" aria-label="Hauptnavigation">${navItems().map(([k,l])=>`<button data-nav-item="${k}" data-page="${k}" class="${page===k?'active':''}">${l}</button>`).join('')}</div><div class="utilities"><div class="panel"><b>Backup</b><p class="small">Lokale Sicherung.</p><div class="row"><button class="btn secondary" data-action="export">Export</button><label class="btn secondary">Import<input id="importFile" type="file" accept="application/json" style="display:none"></label></div></div>${syncPanel()}</div>`}
function syncPanel(){return `<div class="panel"><div class="between"><div><b>GitHub Sync</b><div class="sync-status ${sync.enabled?'green':'muted'}">${esc(sync.status||'Lokal')}</div></div><button class="btn ghost" data-action="toggleSyncPanel">${sync.open?'Zu':'Öffnen'}</button></div>${sync.open?`<div class="hr"></div><label><input type="checkbox" data-sync="enabled" ${sync.enabled?'checked':''}> Sync aktivieren</label><br><label><input type="checkbox" data-sync="auto" ${sync.auto?'checked':''}> Auto-Sync nach Änderungen</label><div class="grid g2" style="margin-top:12px"><label><span class="lbl">GitHub Owner</span><input class="input" data-sync="owner" value="${esc(sync.owner)}" placeholder="z. B. johanneszajac210503"></label><label><span class="lbl">Repository</span><input class="input" data-sync="repo" value="${esc(sync.repo)}" placeholder="z. B. johannes-fitness-hub"></label><label><span class="lbl">Branch</span><input class="input" data-sync="branch" value="${esc(sync.branch||'main')}"></label><label><span class="lbl">JSON-Pfad</span><input class="input" data-sync="path" value="${esc(sync.path||'fitness-hub-data.json')}"></label></div><label style="display:block;margin-top:10px"><span class="lbl">GitHub Token</span><input class="input" type="password" data-sync="token" value="${esc(sync.token)}" placeholder="Fine-grained token: Contents Read/Write"></label><div class="grid g2" style="margin-top:10px"><button class="btn secondary" data-action="ghUpload">Jetzt hochladen</button><button class="btn secondary" data-action="ghDownload">Jetzt laden</button></div><p class="small">Nutze auf PC und iPad/iPhone dieselben Werte. Hochladen speichert diese App-Daten in GitHub. Laden holt sie auf dieses Gerät.</p>`:''}</div>`}
const views={
 home(){const m=state.meals.meals.reduce((a,x)=>{const t=mealTotals(x);return{p:a.p+t.p,c:a.c+t.c,f:a.f+t.f,k:a.k+t.k}},{p:0,c:0,f:0,k:0}); const ph=state.nutrition.phases[state.nutrition.phase];return `${title('Homescreen')}<div class="grid g4">${metric("Übungen",state.gym.exercises.length)}${metric("Workouts",state.gym.workouts.length)}${metric("Meals",state.meals.meals.length)}${metric("Phase",ph.name)}</div><div class="grid g3" style="margin-top:20px"><div class="card"><div style="font-size:42px">🏋️</div><h2>Gym-Tracker</h2><p class="muted">Übungen, Workouts, aktive Sessions und Historie.</p><button class="btn" data-page="gym">Öffnen</button></div><div class="card"><div style="font-size:42px">🍽️</div><h2>Meal-Bibliothek</h2><p class="muted">Meals, Zutaten, Makros und kcal automatisch.</p><p class="small">Bibliothek gesamt: <b>${m.k} kcal</b></p><button class="btn" data-page="meals">Öffnen</button></div><div class="card"><div style="font-size:42px">🎯</div><h2>Ernährungsplan</h2><p class="muted">Cut, Maintenance, Aufbau mit Pre/Post-Fix.</p><p class="small">Aktuell: <b>${ph.calories} kcal</b></p><button class="btn" data-page="nutrition">Öffnen</button></div></div>`},
 gym(){return `${title('Gym-Tracker','Übungen, Workouts, aktive Trainingssessions und Historie.')}<div class="tabs">${[['exercises','Übungen'],['workouts','Workouts'],['training','Aktives Training'],['history','Historie']].map(([k,l])=>`<button class="btn ${gymTab===k?'':'secondary'}" data-gymtab="${k}">${l}${k==='training'&&activeSession?' · Live':''}</button>`).join('')}</div>${gymTab==='exercises'?gymExercises():gymTab==='workouts'?gymWorkouts():gymTab==='training'?gymTraining():gymHistory()}`},
 meals(){return `${title('Meal-Bibliothek','Meals erstellen, bearbeiten, duplizieren und nach Kategorien filtern.')}<div class="card" style="margin-bottom:18px">${mealForm()}</div>${mealFilters()}${mealList()}`},
 nutrition(){return nutritionView()}
};
function title(t,s=''){return `<h1 class="title">${esc(t)}</h1>${s?`<p class="sub">${esc(s)}</p>`:''}`}
function metric(label,value){return `<div class="metric"><div class="l">${esc(label)}</div><div class="v">${esc(value)}</div></div>`}

customElements.define('x-metric',class extends HTMLElement{connectedCallback(){this.className='metric';this.innerHTML=`<div class="l">${esc(this.getAttribute('label'))}</div><div class="v">${esc(this.getAttribute('value'))}</div>`}});
function gymExercises(){const ex=editingExercise?state.gym.exercises.find(x=>x.id===editingExercise):{name:'',category:''};return `<div class="card" style="margin-bottom:18px"><div class="grid g3"><label><span class="lbl">Übungsname</span><input class="input" id="exName" value="${esc(ex?.name||'')}" placeholder="z. B. Bankdrücken"></label><label><span class="lbl">Kategorie</span><input class="input" id="exCat" value="${esc(ex?.category||'')}" placeholder="z. B. Brust"></label><div style="align-self:end" class="row"><button class="btn" data-action="saveExercise">${editingExercise?'Speichern':'Anlegen'}</button>${editingExercise?'<button class="btn secondary" data-action="cancelExercise">Abbrechen</button>':''}</div></div></div>${state.gym.exercises.length?`<div class="grid g3">${state.gym.exercises.map(e=>{const c=state.gym.sessions.filter(s=>s.entries.some(x=>x.exerciseId===e.id)).length;const last=[...state.gym.sessions].find(s=>s.entries.some(x=>x.exerciseId===e.id));return `<div class="card"><div class="between"><div><h3>${esc(e.name)}</h3><div class="green">${esc(e.category||'Keine Kategorie')}</div></div><span class="pill">${c}x</span></div><p class="small">Letzte Session: <b>${last?fmt(last.date):'Noch keine'}</b></p><div class="row"><button class="btn secondary" data-action="editExercise" data-id="${e.id}">Bearbeiten</button><button class="btn danger" data-action="deleteExercise" data-id="${e.id}">Löschen</button></div></div>`}).join('')}</div>`:empty('Keine Übungen','Lege deine erste Übung an.')}`}
function gymWorkouts(){const w=editingWorkout?state.gym.workouts.find(x=>x.id===editingWorkout):{name:'',exerciseIds:[]};return `<div class="card" style="margin-bottom:18px"><div class="grid g2"><label><span class="lbl">Workout-Name</span><input class="input" id="woName" value="${esc(w?.name||'')}" placeholder="z. B. Push Day"></label><div><span class="lbl">Übungen auswählen</span><div class="grid g2">${state.gym.exercises.map(e=>`<label class="panel" style="margin:0"><input type="checkbox" class="woEx" value="${e.id}" ${w?.exerciseIds?.includes(e.id)?'checked':''}> <b>${esc(e.name)}</b><div class="small">${esc(e.category||'')}</div></label>`).join('')}</div></div></div><div class="row" style="margin-top:12px"><button class="btn" data-action="saveWorkout">${editingWorkout?'Speichern':'Erstellen'}</button>${editingWorkout?'<button class="btn secondary" data-action="cancelWorkout">Abbrechen</button>':''}</div></div>${state.gym.workouts.length?`<div class="grid g2">${state.gym.workouts.map(w=>`<div class="card"><div class="between"><div><h3>${esc(w.name)}</h3><p class="small">${w.exerciseIds.length} Übungen</p></div><button class="btn" data-action="startWorkout" data-id="${w.id}">Starten</button></div><div>${w.exerciseIds.map(id=>`<span class="pill">${esc(exName(id))}</span>`).join('')}</div><div class="row" style="margin-top:12px"><button class="btn secondary" data-action="editWorkout" data-id="${w.id}">Bearbeiten</button><button class="btn danger" data-action="deleteWorkout" data-id="${w.id}">Löschen</button></div></div>`).join('')}</div>`:empty('Keine Workouts','Erstelle Push, Pull, Legs oder eigene Pläne.')}`}
function exName(id){return state.gym.exercises.find(e=>e.id===id)?.name||'Gelöschte Übung'}
function gymTraining(){if(!activeSession)return empty('Kein aktives Training','Starte ein Workout aus der Workout-Ansicht.');return `<div class="row" style="margin-bottom:16px"><button class="btn" data-action="finishSession">Session abschließen</button><button class="btn danger" data-action="cancelSession">Abbrechen</button></div><div class="grid">${activeSession.entries.map((e,ei)=>{let last=null;for(const s of state.gym.sessions){const found=s.entries.find(x=>x.exerciseId===e.exerciseId);if(found){last={s,found};break}}return `<div class="card"><div class="between"><div><div class="green" style="font-weight:950;font-size:12px;letter-spacing:.18em">ÜBUNG ${ei+1}</div><h2>${esc(e.exerciseName)}</h2></div><button class="btn secondary" data-action="addSet" data-eid="${e.exerciseId}">Satz +</button></div><div class="panel"><b>Letztes Mal</b>${last?`<p class="small">${esc(last.s.workoutName)} · ${fmt(last.s.date)}</p>${last.found.sets.map((x,i)=>`<span class="pill">${i+1}: ${x.weight}kg × ${x.reps}</span>`).join('')}`:'<p class="small">Noch keine Session.</p>'}</div>${e.sets.map((s,si)=>`<div class="setrow"><b>Satz ${si+1}</b><input class="input setInput" data-eid="${e.exerciseId}" data-si="${si}" data-field="weight" type="number" value="${esc(s.weight)}" placeholder="kg"><input class="input setInput" data-eid="${e.exerciseId}" data-si="${si}" data-field="reps" type="number" value="${esc(s.reps)}" placeholder="Wdh."><button class="btn danger" data-action="removeSet" data-eid="${e.exerciseId}" data-sid="${s.id}">X</button></div>`).join('')}</div>`}).join('')}</div>`}
function gymHistory(){return state.gym.sessions.length?`<div class="grid">${state.gym.sessions.map(s=>`<div class="card"><h3>${esc(s.workoutName)}</h3><p class="small">${fmt(s.date)}</p><div class="grid g2">${s.entries.map(e=>`<div class="panel"><b>${esc(e.exerciseName)}</b><div>${e.sets.map((x,i)=>`<span class="pill">${i+1}: ${x.weight}kg × ${x.reps}</span>`).join('')}</div></div>`).join('')}</div></div>`).join('')}</div>`:empty('Keine Historie','Schließe dein erstes Workout ab.')}
function empty(t,s){return `<div class="empty"><b>${esc(t)}</b><p>${esc(s)}</p></div>`}
function mealForm(){const blank={name:'',category:state.meals.categories[0],suitableFor:'',note:'',ingredients:[{id:uid(),name:'',portion:'',protein:'',carbs:'',fat:''}]};const m=editingMeal?state.meals.meals.find(x=>x.id===editingMeal):blank;const t=mealTotals(m);return `<div class="between"><h2>${editingMeal?'Meal bearbeiten':'Neues Meal'}</h2><b class="green">${t.k} kcal</b></div><div class="grid g2"><label><span class="lbl">Name</span><input class="input" id="mealName" value="${esc(m.name)}"></label><label><span class="lbl">Kategorie</span><select id="mealCat">${state.meals.categories.map(c=>`<option ${m.category===c?'selected':''}>${esc(c)}</option>`).join('')}</select></label><label><span class="lbl">Geeignet für</span><input class="input" id="mealSuit" value="${esc(m.suitableFor)}"></label><label><span class="lbl">Notiz</span><input class="input" id="mealNote" value="${esc(m.note)}"></label></div><div id="ingredients">${(m.ingredients||[]).map((i,idx)=>ingRow(i,idx)).join('')}</div><div class="row" style="margin-top:12px"><button class="btn secondary" data-action="addIngredient">Zutat +</button><button class="btn" data-action="saveMeal">${editingMeal?'Speichern':'Meal speichern'}</button>${editingMeal?'<button class="btn secondary" data-action="cancelMeal">Abbrechen</button>':''}</div>`}
function ingRow(i,idx){return `<div class="ingredient"><input class="input ing" data-idx="${idx}" data-field="name" value="${esc(i.name)}" placeholder="Zutat"><input class="input ing" data-idx="${idx}" data-field="portion" value="${esc(i.portion)}" placeholder="Portion"><input class="input ing" data-idx="${idx}" data-field="protein" type="number" value="${esc(i.protein)}" placeholder="P"><input class="input ing" data-idx="${idx}" data-field="carbs" type="number" value="${esc(i.carbs)}" placeholder="C"><input class="input ing" data-idx="${idx}" data-field="fat" type="number" value="${esc(i.fat)}" placeholder="F"><button class="btn danger" data-action="removeIngredient" data-idx="${idx}">X</button></div>`}
function mealFilters(){return `<div class="card" style="margin-bottom:18px"><div class="grid g2"><label><span class="lbl">Suche</span><input class="input" id="mealSearch" value="${esc(mealSearch)}" placeholder="Meal oder Zutat suchen"></label><label><span class="lbl">Kategorie</span><select id="mealFilter"><option>Alle</option>${state.meals.categories.map(c=>`<option ${mealFilter===c?'selected':''}>${esc(c)}</option>`).join('')}</select></label></div></div>`}
function mealList(){let list=state.meals.meals.filter(m=>(mealFilter==='Alle'||m.category===mealFilter)&&JSON.stringify(m).toLowerCase().includes(mealSearch.toLowerCase()));return list.length?`<div class="grid g2">${list.map(m=>{const t=mealTotals(m);return `<div class="card"><div class="between"><div><div class="green">${esc(m.category)}</div><h2>${esc(m.name)}</h2><p class="small">${esc(m.suitableFor)}</p></div><div style="text-align:right"><div style="font-size:28px;font-weight:950">${t.k}</div><div class="small">kcal</div></div></div><p class="muted">${esc(m.note)}</p><div class="grid g3"><x-metric label="Protein" value="${t.p}g"></x-metric><x-metric label="Carbs" value="${t.c}g"></x-metric><x-metric label="Fett" value="${t.f}g"></x-metric></div><div style="margin-top:12px">${m.ingredients.map(i=>`<div class="panel"><b>${esc(i.name)}</b> · ${esc(i.portion)} <span class="small">(${i.protein}P / ${i.carbs}C / ${i.fat}F)</span></div>`).join('')}</div><div class="row"><button class="btn secondary" data-action="editMeal" data-id="${m.id}">Bearbeiten</button><button class="btn secondary" data-action="dupMeal" data-id="${m.id}">Duplizieren</button><button class="btn danger" data-action="deleteMeal" data-id="${m.id}">Löschen</button></div></div>`}).join('')}</div>`:empty('Keine Meals gefunden','Passe Suche oder Filter an.')}
function nutritionView(){const nt=state.nutrition,p=nt.phases[nt.phase];const carbs=Math.max(0,Math.round((p.calories-p.protein*4-p.fat*9)/4));const mealCount=Math.min(6,Math.max(3,Math.round(p.meals)));const workoutCarbs=Math.round(n(p.weight)*1.1);const workoutProtein=Math.min(35,Math.max(25,Math.round(n(p.protein)*.18)));const workoutFat=Math.min(5,Math.max(3,Math.round(n(p.fat)*.08)));const other=[...Array(mealCount).keys()].filter(i=>i!==1&&i!==2);function dist(total,weights){let vals=weights.map(w=>Math.round(total*w/weights.reduce((a,b)=>a+b,0)));let diff=Math.round(total)-vals.reduce((a,b)=>a+b,0);if(vals.length)vals[vals.length-1]+=diff;return vals}const pd=dist(Math.max(0,p.protein-workoutProtein*2),other.map(()=>1));const fd=dist(Math.max(0,p.fat-workoutFat*2),other.map(i=>i===0?1.4:1));const cd=dist(Math.max(0,carbs-workoutCarbs*2),other.map(i=>i===0?.8:1.15));const rows=[...Array(mealCount).keys()].map(i=>({i:i+1,p:i===1||i===2?workoutProtein:pd[other.indexOf(i)]||0,c:i===1||i===2?workoutCarbs:cd[other.indexOf(i)]||0,f:i===1||i===2?workoutFat:fd[other.indexOf(i)]||0}));const avg=nt.weightLog.slice(0,7).reduce((a,x)=>a+x.weight,0)/(nt.weightLog.slice(0,7).length||1);return `${title('Ernährungsplan','Cut, Maintenance und Aufbau mit fixen Pre-/Post-Workout-Carbs.')}<div class="tabs">${Object.values(nt.phases).map(ph=>`<button class="btn ${nt.phase===ph.id?'':'secondary'}" data-phase="${ph.id}">${esc(ph.name)}</button>`).join('')}</div><div class="grid g5"><x-metric label="Kalorien" value="${p.calories}"></x-metric><x-metric label="Protein" value="${p.protein}g"></x-metric><x-metric label="Fett" value="${p.fat}g"></x-metric><x-metric label="Carbs gesamt" value="${carbs}g"></x-metric><x-metric label="Pre/Post Carbs" value="${workoutCarbs}g"></x-metric></div><div class="card" style="margin-top:18px"><h2>Phase bearbeiten</h2><p class="muted">${esc(p.goal)}</p><div class="grid g3"><label><span class="lbl">Kalorien</span><input class="input nut" data-key="calories" type="number" value="${p.calories}"></label><label><span class="lbl">Meals</span><input class="input nut" data-key="meals" type="number" value="${p.meals}"></label><label><span class="lbl">Körpergewicht</span><input class="input nut" data-key="weight" type="number" value="${p.weight}"></label><label><span class="lbl">Protein</span><input class="input nut" data-key="protein" type="number" value="${p.protein}"></label><label><span class="lbl">Fett</span><input class="input nut" data-key="fat" type="number" value="${p.fat}"></label><label><span class="lbl">Ziel/Notiz</span><input class="input nut" data-key="goal" value="${esc(p.goal)}"></label></div></div><div class="grid g2" style="margin-top:18px"><div class="card"><h2>Meal-Aufteilung</h2><p class="small">Pre und Post sind fix: Carbs = 1,1 × Körpergewicht. Protein dort ca. 35 g, Fett niedrig.</p><div class="tablewrap"><table><thead><tr><th>Meal</th><th>Fokus</th><th>Protein</th><th>Carbs</th><th>Fett</th><th>kcal</th></tr></thead><tbody>${rows.map(r=>`<tr><td><b>Meal ${r.i}</b></td><td class="green">${r.i===2?'Pre-Workout fix':r.i===3?'Post-Workout fix':r.i===1?'Frühstück':'Normal'}</td><td>${r.p}g</td><td>${r.c}g</td><td>${r.f}g</td><td><b>${kcal(r.p,r.c,r.f)}</b></td></tr>`).join('')}</tbody></table></div></div><div class="card"><h2>Gewichts-Log</h2><div class="row"><input id="weightEntry" class="input" type="number" placeholder="Gewicht kg" style="flex:1"><button class="btn" data-action="addWeight">Eintragen</button></div><div class="metric" style="margin-top:12px"><div class="l">7-Tage-Schnitt</div><div class="v">${avg?avg.toFixed(1):'-'} kg</div></div><div>${nt.weightLog.map(x=>`<div class="panel between"><span>${fmt(x.date)}</span><b>${x.weight} kg</b></div>`).join('')}</div></div></div>`}

function setupNavDrag(){
  const nav=document.getElementById('mainNav');
  if(!nav)return;
  const HOLD_MS=210;
  const MOVE_CANCEL=10;

  nav.querySelectorAll('[data-nav-item]').forEach(btn=>{
    btn.onpointerdown=e=>{
      if(e.button!==undefined&&e.button!==0)return;
      const startX=e.clientX,startY=e.clientY;
      let latestX=startX, latestY=startY;
      let started=false, drag=null, timer=null;

      const cleanup=(ev)=>{
        clearTimeout(timer);
        window.removeEventListener('pointermove',move);
        window.removeEventListener('pointerup',cleanup);
        btn.classList.remove('nav-hold');
        nav.querySelectorAll('.nav-target').forEach(x=>x.classList.remove('nav-target'));
        if(!started)return;
        ev?.preventDefault?.();
        const {placeholder}=drag;
        if(drag.raf) cancelAnimationFrame(drag.raf);
        btn.classList.remove('nav-dragging');
        btn.style.position='';
        btn.style.left='';btn.style.top='';btn.style.width='';btn.style.height='';
        btn.style.pointerEvents='';btn.style.zIndex='';btn.style.transform='';btn.style.transformOrigin='';btn.style.willChange='';btn.style.opacity='';
        placeholder.replaceWith(btn);
        btn.dataset.dragSuppress='1';
        state.ui.navOrder=[...nav.querySelectorAll('[data-nav-item]')].map(x=>x.dataset.navItem);
        persistStateOnly();
        setTimeout(()=>{btn.dataset.dragSuppress='0'},120);
      };

      const startDrag=()=>{
        started=true;
        const rect=btn.getBoundingClientRect();
        const placeholder=document.createElement('div');
        placeholder.className='nav-placeholder';
        placeholder.style.height=rect.height+'px';
        btn.parentNode.insertBefore(placeholder,btn);
        btn.classList.add('nav-dragging');
        // Während des Ziehens hängt der Button direkt am Viewport/Mauszeiger.
        // Dafür wird er temporär in den body verschoben; sonst können Sidebar/Blur-Container
        // einen Positionsversatz erzeugen.
        document.body.appendChild(btn);
        btn.style.position='fixed';
        const offsetX=Math.max(0,Math.min(rect.width,latestX-rect.left));
        const offsetY=Math.max(0,Math.min(rect.height,latestY-rect.top));
        btn.style.left=(latestX-offsetX)+'px';
        btn.style.top=(latestY-offsetY)+'px';
        btn.style.width=rect.width+'px';
        btn.style.height=rect.height+'px';
        btn.style.pointerEvents='none';
        btn.style.zIndex='999';
        btn.style.opacity='1';
        btn.style.willChange='transform,left,top';
        // Exakt an der Greif-Stelle skalieren/rotieren: Der Mauszeiger/Finger bleibt dadurch direkt auf dem Punkt, den du angefasst hast.
        btn.style.transformOrigin=offsetX+'px '+offsetY+'px';
        btn.style.transform='scale(1.065) translateY(-3px) rotate(0deg)';
        drag={placeholder,rect,offsetX,offsetY,lastIndex:-1,lastSwap:0,raf:null};
        const animateDrag=()=>{
          if(!started||!drag)return;
          const t=performance.now();
          const wiggle=Math.sin(t/62)*3.1 + Math.sin(t/127)*0.9;
          btn.style.transform=`scale(1.065) translateY(-3px) rotate(${wiggle}deg)`;
          drag.raf=requestAnimationFrame(animateDrag);
        };
        animateDrag();
        try{btn.setPointerCapture?.(e.pointerId)}catch{}
        navigator.vibrate?.(10);
      };

      const move=ev=>{
        latestX=ev.clientX; latestY=ev.clientY;
        if(!started){
          if(Math.abs(ev.clientX-startX)>MOVE_CANCEL||Math.abs(ev.clientY-startY)>MOVE_CANCEL){
            clearTimeout(timer);
            btn.classList.remove('nav-hold');
          }
          return;
        }
        ev.preventDefault();
        btn.style.left=(ev.clientX-drag.offsetX)+'px';
        btn.style.top=(ev.clientY-drag.offsetY)+'px';
        // Wackeln läuft jetzt über requestAnimationFrame weiter, auch wenn Maus/Finger stillsteht.
        btn.style.opacity='1';

        const siblings=[...nav.querySelectorAll('[data-nav-item]')].filter(x=>x!==btn);
        let inserted=false;
        const pointerY=ev.clientY;
        for(const el of siblings){
          const r=el.getBoundingClientRect();
          const buffer=Math.min(12,r.height*.22);
          const before=pointerY<r.top+r.height/2-buffer;
          const after=pointerY>r.top+r.height/2+buffer;
          if(before){
            if(drag.placeholder.nextSibling!==el) nav.insertBefore(drag.placeholder,el);
            inserted=true;
            break;
          }
          if(after&&el.nextSibling!==drag.placeholder){
            // Nur nach unten tauschen, wenn der Pointer klar über die Mitte hinaus ist.
            if(el.nextSibling) nav.insertBefore(drag.placeholder,el.nextSibling);
            else nav.appendChild(drag.placeholder);
            inserted=true;
          }
        }
        if(!inserted) nav.appendChild(drag.placeholder);
      };

      btn.classList.add('nav-hold');
      timer=setTimeout(startDrag,HOLD_MS);
      window.addEventListener('pointermove',move,{passive:false});
      window.addEventListener('pointerup',cleanup,{once:true});
      setTimeout(()=>{if(!started)btn.classList.remove('nav-hold')},HOLD_MS+130);
    };
  });
}
function bind(){setupNavDrag();document.querySelectorAll('[data-page]').forEach(b=>b.onclick=()=>{if(b.dataset.dragSuppress==='1'){b.dataset.dragSuppress='0';return}page=b.dataset.page;render()});document.querySelectorAll('[data-gymtab]').forEach(b=>b.onclick=()=>{gymTab=b.dataset.gymtab;render()});document.querySelectorAll('[data-phase]').forEach(b=>b.onclick=()=>{state.nutrition.phase=b.dataset.phase;save()});document.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>actions[b.dataset.action]?.(b));document.querySelectorAll('[data-sync]').forEach(el=>{el.onchange=()=>{const k=el.dataset.sync;sync[k]=el.type==='checkbox'?el.checked:el.value;sync.status=sync.enabled?'Bereit':'Lokal';saveSync()}; if(el.tagName==='INPUT'&&el.type!=='checkbox')el.oninput=el.onchange});document.querySelectorAll('.setInput').forEach(el=>el.oninput=()=>{const e=activeSession.entries.find(x=>x.exerciseId===el.dataset.eid);e.sets[Number(el.dataset.si)][el.dataset.field]=el.value});document.querySelectorAll('.nut').forEach(el=>el.onchange=()=>{const p=state.nutrition.phases[state.nutrition.phase],k=el.dataset.key;p[k]=['calories','meals','weight','protein','fat'].includes(k)?n(el.value):el.value;save()});const ms=document.getElementById('mealSearch');if(ms)ms.oninput=()=>{mealSearch=ms.value;render()};const mf=document.getElementById('mealFilter');if(mf)mf.onchange=()=>{mealFilter=mf.value;render()};const imp=document.getElementById('importFile');if(imp)imp.onchange=importFile;}
const actions={toggleSyncPanel(){sync.open=!sync.open;saveSync()},saveExercise(){const name=document.getElementById('exName').value.trim(),cat=document.getElementById('exCat').value.trim();if(!name)return; if(editingExercise){const e=state.gym.exercises.find(x=>x.id===editingExercise);e.name=name;e.category=cat}else state.gym.exercises.push({id:uid(),name,category:cat});editingExercise=null;save()},editExercise(b){editingExercise=b.dataset.id;render()},cancelExercise(){editingExercise=null;render()},deleteExercise(b){if(confirm('Übung löschen?')){state.gym.exercises=state.gym.exercises.filter(e=>e.id!==b.dataset.id);state.gym.workouts.forEach(w=>w.exerciseIds=w.exerciseIds.filter(id=>id!==b.dataset.id));save()}},saveWorkout(){const name=document.getElementById('woName').value.trim(),ids=[...document.querySelectorAll('.woEx:checked')].map(x=>x.value);if(!name||!ids.length)return;if(editingWorkout){const w=state.gym.workouts.find(x=>x.id===editingWorkout);w.name=name;w.exerciseIds=ids}else state.gym.workouts.push({id:uid(),name,exerciseIds:ids});editingWorkout=null;save()},editWorkout(b){editingWorkout=b.dataset.id;render()},cancelWorkout(){editingWorkout=null;render()},deleteWorkout(b){if(confirm('Workout löschen?')){state.gym.workouts=state.gym.workouts.filter(w=>w.id!==b.dataset.id);save()}},startWorkout(b){const w=state.gym.workouts.find(x=>x.id===b.dataset.id);activeSession={id:uid(),workoutId:w.id,workoutName:w.name,startedAt:now(),date:now(),entries:w.exerciseIds.map(id=>({exerciseId:id,exerciseName:exName(id),sets:[{id:uid(),weight:'',reps:''}]}))};gymTab='training';render()},addSet(b){activeSession.entries.find(e=>e.exerciseId===b.dataset.eid).sets.push({id:uid(),weight:'',reps:''});render()},removeSet(b){const e=activeSession.entries.find(x=>x.exerciseId===b.dataset.eid);if(e.sets.length>1)e.sets=e.sets.filter(s=>s.id!==b.dataset.sid);render()},finishSession(){activeSession.entries.forEach(e=>e.sets=e.sets.map(s=>({id:s.id,weight:n(s.weight),reps:n(s.reps)})).filter(s=>s.weight>0||s.reps>0));activeSession.date=now();activeSession.finishedAt=now();state.gym.sessions.unshift(activeSession);activeSession=null;gymTab='history';save()},cancelSession(){activeSession=null;render()},addIngredient(){const m=getMealForm();m.ingredients.push({id:uid(),name:'',portion:'',protein:'',carbs:'',fat:''});tempMeal=m;renderMealFormTemp(m)},removeIngredient(b){const m=getMealForm();if(m.ingredients.length>1)m.ingredients.splice(Number(b.dataset.idx),1);renderMealFormTemp(m)},saveMeal(){const m=getMealForm();if(!m.name.trim())return;if(editingMeal){const idx=state.meals.meals.findIndex(x=>x.id===editingMeal);state.meals.meals[idx]={...m,id:editingMeal}}else state.meals.meals.push({...m,id:uid()});editingMeal=null;save()},editMeal(b){editingMeal=b.dataset.id;window.scrollTo({top:0,behavior:'smooth'});render()},cancelMeal(){editingMeal=null;render()},dupMeal(b){const m=clone(state.meals.meals.find(x=>x.id===b.dataset.id));m.id=uid();m.name+=' Kopie';m.ingredients.forEach(i=>i.id=uid());state.meals.meals.push(m);save()},deleteMeal(b){if(confirm('Meal löschen?')){state.meals.meals=state.meals.meals.filter(m=>m.id!==b.dataset.id);save()}},addWeight(){const v=document.getElementById('weightEntry').value;if(v){state.nutrition.weightLog.unshift({id:uid(),date:now(),weight:n(v)});save()}},export(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='johannes-fitness-hub-backup.json';a.click();URL.revokeObjectURL(a.href)},ghUpload(){githubUpload(true)},ghDownload(){githubDownload()}};
let tempMeal=null;function getMealForm(){const base=tempMeal||editingMeal?clone(state.meals.meals.find(x=>x.id===editingMeal)):null;const ings=[...document.querySelectorAll('.ingredient')].map((row,idx)=>{const obj={id:base?.ingredients?.[idx]?.id||uid()};row.querySelectorAll('.ing').forEach(i=>obj[i.dataset.field]=['protein','carbs','fat'].includes(i.dataset.field)?n(i.value):i.value);return obj});return {id:editingMeal||uid(),name:document.getElementById('mealName').value,category:document.getElementById('mealCat').value,suitableFor:document.getElementById('mealSuit').value,note:document.getElementById('mealNote').value,ingredients:ings}}
function renderMealFormTemp(m){tempMeal=m;document.querySelector('.main').innerHTML=views.meals();bind()}
function importFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);localStorage.setItem(STORAGE_KEY,JSON.stringify(state));alert('Backup importiert.');render()}catch{alert('Import fehlgeschlagen.')}};r.readAsText(f)}
function ghReady(){return sync.owner&&sync.repo&&sync.branch&&sync.path&&sync.token}
function b64EncodeUnicode(str){return btoa(unescape(encodeURIComponent(str)))}
function b64DecodeUnicode(str){return decodeURIComponent(escape(atob(str.replace(/\n/g,''))))}
async function ghGet(){const url=`https://api.github.com/repos/${sync.owner}/${sync.repo}/contents/${sync.path}?ref=${sync.branch}`;const res=await fetch(url,{headers:{Authorization:`Bearer ${sync.token}`,Accept:'application/vnd.github+json'}});if(res.status===404)return null;if(!res.ok)throw new Error('GitHub laden fehlgeschlagen: '+res.status+' '+await res.text());return res.json()}
async function githubUpload(show){if(!ghReady()){alert('GitHub Owner, Repo, Branch, Pfad und Token ausfüllen.');return}try{sync.status='Lade SHA...';saveSync();const current=await ghGet();const body={message:'Update Fitness Hub data',content:b64EncodeUnicode(JSON.stringify({updatedAt:now(),state},null,2)),branch:sync.branch};if(current?.sha)body.sha=current.sha;sync.status='Speichere...';saveSync();const res=await fetch(`https://api.github.com/repos/${sync.owner}/${sync.repo}/contents/${sync.path}`,{method:'PUT',headers:{Authorization:`Bearer ${sync.token}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});if(!res.ok)throw new Error('GitHub speichern fehlgeschlagen: '+res.status+' '+await res.text());sync.status='Gespeichert: '+new Date().toLocaleTimeString('de-DE');saveSync();if(show)alert('Daten zu GitHub hochgeladen.')}catch(e){sync.status='Fehler';saveSync();alert(e.message)}}
async function githubDownload(){if(!ghReady()){alert('GitHub Owner, Repo, Branch, Pfad und Token ausfüllen.');return}try{sync.status='Lade...';saveSync();const data=await ghGet();if(!data){alert('Noch keine GitHub-Datendatei gefunden. Drücke zuerst auf „Jetzt hochladen“.');sync.status='Keine Datei';saveSync();return}const parsed=JSON.parse(b64DecodeUnicode(data.content));state=parsed.state||parsed;localStorage.setItem(STORAGE_KEY,JSON.stringify(state));sync.status='Geladen: '+new Date().toLocaleTimeString('de-DE');saveSync();alert('Daten aus GitHub geladen.');render()}catch(e){sync.status='Fehler';saveSync();alert(e.message)}}
render();
})();
